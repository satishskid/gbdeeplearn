name: Release Gate

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required secrets
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          if [ -z "$ADMIN_API_TOKEN" ]; then
            echo "Missing required secret: ADMIN_API_TOKEN"
            exit 1
          fi

      - name: Run strict release orchestrator
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
          DEEPLEARN_API_BASE_URL: ${{ vars.DEEPLEARN_API_BASE_URL }}
          DEEPLEARN_PAGES_BASE_URL: ${{ vars.DEEPLEARN_PAGES_BASE_URL }}
          EXPECTED_COORDINATOR_EMAILS: ${{ vars.EXPECTED_COORDINATOR_EMAILS }}
          DISALLOWED_EMAIL_MARKERS: ${{ vars.DISALLOWED_EMAIL_MARKERS }}
        run: npm run release:orchestrate

      - name: Upload release gate report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-gate-report
          path: reports/release-gate-latest.json
          if-no-files-found: warn

      - name: Publish release summary
        if: always()
        run: |
          if [ -f reports/release-gate-latest.json ]; then
            echo '## Release Gate Report' >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat reports/release-gate-latest.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No release gate report generated." >> "$GITHUB_STEP_SUMMARY"
          fi
